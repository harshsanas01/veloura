services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: veloura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: veloura
      POSTGRES_PASSWORD: veloura
      POSTGRES_DB: veloura
    ports:
      - "5433:5432"
    volumes:
      - veloura_pgdata:/var/lib/postgresql/data
      - ./scripts/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veloura -d veloura"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: veloura-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://veloura:veloura@postgres:5432/veloura
      VELOURA_CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: veloura-web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  veloura_pgdata:
