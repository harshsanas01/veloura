name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint, typecheck, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: veloura
          POSTGRES_PASSWORD: veloura
          POSTGRES_DB: veloura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U veloura -d veloura_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://veloura:veloura@localhost:5432/veloura_test?sslmode=disable
      JWT_SECRET_KEY: ci-test-secret
      OPENAI_API_KEY: ""
      VELOURA_CORS_ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Enable pgvector extension
        run: |
          sudo apt-get install -y postgresql-client
          PGPASSWORD=veloura psql -h localhost -U veloura -d veloura_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Install dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: apps/api
        run: ruff check src tests

      - name: mypy
        working-directory: apps/api
        run: mypy src

      - name: Run tests
        working-directory: apps/api
        run: pytest tests/ -v

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: ESLint
        working-directory: apps/web
        run: npm run lint

      - name: Type check
        working-directory: apps/web
        run: npm run typecheck

      - name: Unit tests
        working-directory: apps/web
        run: npm run test

      - name: Production build
        working-directory: apps/web
        env:
          VITE_API_BASE_URL: https://api.example.com/api
        run: npm run build
